<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Dark-mode variants come last: browsers use the last matching icon, so the
         bright-ink set wins under prefers-color-scheme: dark. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Flattened onto cream: iOS renders transparency as black. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>highlighters</title>
    <meta
      name="description"
      content="Realistic, customizable highlighter-pen marks for the web. Bindings for React, Vue, and Svelte."
    />
    <meta name="theme-color" content="#f7f6f2" />
    <link rel="canonical" href="https://highlighte.rs/" />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph / social previews. The 1200x630 PNG at /og-image.png
         is the de facto standard size — Facebook, X, LinkedIn, Discord,
         Slack, iMessage all render it at ~600 CSS px wide, so 1200 px
         covers 2x DPI without wasting bytes. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="highlighters" />
    <meta
      property="og:description"
      content="Realistic, customizable highlighter-pen marks for the web. Bindings for React, Vue, and Svelte."
    />
    <meta property="og:url" content="https://highlighte.rs/" />
    <meta property="og:image" content="https://highlighte.rs/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="highlighters" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="highlighters" />
    <meta
      name="twitter:description"
      content="Realistic, customizable highlighter-pen marks for the web. Bindings for React, Vue, and Svelte."
    />
    <meta name="twitter:image" content="https://highlighte.rs/og-image.png" />

    <!-- Structured data. SoftwareApplication describes the runnable
         library; SoftwareSourceCode describes the repo. Both are parsed
         by Google, Perplexity, and other AI crawlers as the most
         reliable signal of what this page is. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "highlighters",
            "alternateName": "@highlighters/core",
            "description": "JavaScript library that draws realistic, customizable highlighter-pen marks for the web — chisel-tip ink physics, wavy edges, and curated palettes. Bindings for React, Vue, and Svelte, plus a framework-agnostic core.",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Cross-platform (browser, Node, edge runtimes)",
            "url": "https://highlighte.rs/",
            "downloadUrl": "https://www.npmjs.com/package/@highlighters/core",
            "license": "https://opensource.org/licenses/MIT",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "author": {
              "@type": "Person",
              "name": "Jace Attard",
              "url": "https://github.com/JaceThings"
            }
          },
          {
            "@type": "SoftwareSourceCode",
            "name": "highlighters",
            "codeRepository": "https://github.com/JaceThings/highlighters",
            "programmingLanguage": "TypeScript",
            "license": "https://opensource.org/licenses/MIT",
            "url": "https://github.com/JaceThings/highlighters",
            "author": {
              "@type": "Person",
              "name": "Jace Attard",
              "url": "https://github.com/JaceThings"
            }
          }
        ]
      }
    </script>
    <script>
      // Set `data-platform="mac"` on <html> for macOS desktop browsers so
      // CSS can opt into Mac-specific affordances. `Macintosh` in the UA is
      // the canonical marker for macOS browsers and excludes iOS, which
      // reports `iPhone`/`iPad`/`iPod` instead.
      if (/Macintosh/.test(navigator.userAgent)) {
        document.documentElement.setAttribute("data-platform", "mac");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
