name: Release

# Manual-only. A real release needs npm publish auth: OIDC trusted publishing
# configured on npmjs, or an NPM_TOKEN secret. Until that is set up, dispatch this
# by hand so a push to main can never trigger a premature/accidental publish.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >=11.5.1, which supports OIDC trusted
          # publishing natively. Keeps CI on Node 22 for compat testing.
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build packages first so consumers (downstream typechecks) can
      # resolve the library `dist/` exports.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
