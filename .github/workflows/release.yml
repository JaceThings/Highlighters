name: Release

# Automated publishing via Changesets + npm OIDC trusted publishing (no tokens).
#
# Flow (see CONTRIBUTING.md > Release flow):
#   1. A merged PR carries a changeset. On push to main this action opens or
#      updates a "chore: version packages" PR that bumps versions + CHANGELOGs.
#   2. Merging that PR pushes to main with no changesets left, so this action
#      runs `changeset publish` and releases to npm with provenance.
# A push with no changesets and nothing unpublished is a no-op, so a normal
# merge to main never triggers an accidental publish.
#
# One-time setup on npmjs: each @highlighters/* package needs a Trusted Publisher
# (package Settings > Trusted Publisher > GitHub Actions; repo
# JaceThings/Highlighters, workflow release.yml). The id-token: write permission
# and provenance below are what npm's OIDC exchange checks for. workflow_dispatch
# stays so a release can also be run by hand.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # OIDC trusted publishing needs npm >=11.5.1; pin to latest so it works
      # regardless of which npm the resolved Node 24 minor happens to ship.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build packages first so consumers (downstream typechecks) can
      # resolve the library `dist/` exports.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
