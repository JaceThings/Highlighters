name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build packages first so consumers (downstream typechecks) can
      # resolve the library `dist/` exports.
      - run: pnpm build
      - run: pnpm typecheck
      - name: Run tests with coverage
        run: pnpm coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          # Token is optional for public repos; setting it improves
          # rate-limit headroom when present.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  size-limit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Run size-limit directly so it sees the workspace-installed
      # @size-limit/preset-small-lib. Hard-fails when any per-package
      # budget is exceeded.
      - run: pnpm size

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip
